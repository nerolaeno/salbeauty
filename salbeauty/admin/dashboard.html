<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Salbeauty</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
<div class="admin-layout">
<aside class="admin-sidebar" id="adminSidebar"></aside>
<div class="admin-main">
<header class="admin-topbar">
<button class="btn btn-light d-lg-none" id="toggleSidebar"><i class="bi bi-list"></i></button>
<h1>Dashboard Admin</h1>
</header>
<section class="container-fluid px-0">
<div class="row g-3 mb-4" id="statsCards"></div>
<div class="row g-4">
<div class="col-lg-8">
<div class="panel-card">
<div class="panel-header"><h2>Recent Product Activity</h2></div>
<ul class="activity-list" id="recentActivity"></ul>
</div>
</div>
<div class="col-lg-4">
<div class="panel-card">
<div class="panel-header"><h2>Quick Action</h2></div>
<div class="d-grid gap-2">
<a href="products.html" class="btn btn-pink"><i class="bi bi-plus-lg me-2"></i>Tambah Produk</a>
<a href="products.html" class="btn btn-soft"><i class="bi bi-kanban me-2"></i>Kelola Data</a>
<button class="btn btn-soft" id="exportCsvBtn"><i class="bi bi-filetype-csv me-2"></i>Export CSV</button>
</div>
</div>
</div>
</div>
</section>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="assets/js/admin-data.js"></script>
<script src="assets/js/admin-layout.js"></script>
<script src="assets/js/admin-dashboard.js"></script>
</body>
</html>
