<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Produk - Salbeauty Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
<div class="admin-layout">
<aside class="admin-sidebar" id="adminSidebar"></aside>
<div class="admin-main">
<header class="admin-topbar"><button class="btn btn-light d-lg-none" id="toggleSidebar"><i class="bi bi-list"></i></button><h1>Edit Produk</h1></header>
<section class="panel-card">
<form id="editForm" class="row g-3">
<div class="col-md-6"><label class="form-label">Nama Produk</label><input class="form-control input-soft" name="name" required></div>
<div class="col-md-6"><label class="form-label">Brand</label><input class="form-control input-soft" name="brand" required></div>
<div class="col-md-6"><label class="form-label">Kategori</label><input class="form-control input-soft" name="category" required></div>
<div class="col-md-6"><label class="form-label">Skin Type</label><input class="form-control input-soft" name="skinType" required></div>
<div class="col-md-6"><label class="form-label">Harga</label><input type="number" class="form-control input-soft" name="price" required></div>
<div class="col-md-6"><label class="form-label">Rating</label><input type="number" step="0.1" min="0" max="5" class="form-control input-soft" name="rating" required></div>
<div class="col-md-6"><label class="form-label">Ingredient</label><input class="form-control input-soft" name="ingredient" required></div>
<div class="col-md-6"><label class="form-label">DSS Score</label><input type="number" step="0.01" class="form-control input-soft" name="dss" required></div>
<div class="col-12 d-flex gap-2"><button class="btn btn-pink" type="submit">Simpan Perubahan</button><a href="products.html" class="btn btn-soft">Cancel</a></div>
</form>
</section>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="assets/js/admin-data.js"></script>
<script src="assets/js/admin-layout.js"></script>
<script src="assets/js/admin-edit.js"></script>
</body>
</html>
