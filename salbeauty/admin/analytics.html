<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics - Salbeauty Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
<div class="admin-layout">
<aside class="admin-sidebar" id="adminSidebar"></aside>
<div class="admin-main">
<header class="admin-topbar"><button class="btn btn-light d-lg-none" id="toggleSidebar"><i class="bi bi-list"></i></button><h1>Analytics DSS</h1></header>

<section class="row g-3 mb-4" id="analyticsKpi"></section>

<section class="row g-4">
<div class="col-lg-8"><div class="panel-card"><h2 class="chart-title">Top Beauty Picks (Beauty Match)</h2><div class="chart-wrap"><canvas id="topBeautyChart"></canvas></div></div></div>
<div class="col-lg-4"><div class="panel-card"><h2 class="chart-title">Best Value Shortlist</h2><ul id="bestValueList" class="top-list analytics-top-list mb-0"></ul></div></div>
<div class="col-lg-6"><div class="panel-card"><h2 class="chart-title">Most Loved Brands</h2><div class="chart-wrap"><canvas id="brandChart"></canvas></div></div></div>
<div class="col-lg-6"><div class="panel-card"><h2 class="chart-title">Skin Match Comparison</h2><div class="chart-wrap"><canvas id="skinTypeChart"></canvas></div></div></div>
<div class="col-lg-8"><div class="panel-card"><h2 class="chart-title">Price vs Quality Insight</h2><div class="chart-wrap"><canvas id="priceQualityChart"></canvas></div></div></div>
<div class="col-lg-4"><div class="panel-card"><h2 class="chart-title">Top DSS Products</h2><ul id="topDssList" class="top-list analytics-top-list mb-0"></ul></div></div>
</section>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="assets/js/admin-data.js"></script>
<script src="assets/js/admin-layout.js"></script>
<script src="assets/js/admin-analytics.js"></script>
</body>
</html>
