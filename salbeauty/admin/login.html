<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Salbeauty</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/admin.css">
</head>
<body class="admin-auth-body">
<div class="auth-bg-shape auth-bg-shape-1"></div>
<div class="auth-bg-shape auth-bg-shape-2"></div>
<main class="auth-wrapper">
<div class="auth-card">
<div class="text-center mb-4">
<div class="auth-icon"><i class="bi bi-stars"></i></div>
<span class="brand-pill">Salbeauty Admin</span>
<h1 class="auth-title mt-3">Selamat Datang</h1>
<p class="auth-subtitle">Masuk untuk mengelola produk, insight DSS, dan data rekomendasi beauty.</p>
</div>
<form id="loginForm" class="auth-form">
<div class="mb-3">
<label class="form-label">Email</label>
<div class="input-wrap">
<i class="bi bi-envelope"></i>
<input type="email" class="form-control input-soft" id="email" placeholder="admin@salbeauty.com" required>
</div>
</div>
<div class="mb-2">
<label class="form-label">Password</label>
<div class="input-wrap input-wrap-password">
<i class="bi bi-key"></i>
<input type="password" class="form-control input-soft" id="password" placeholder="Masukkan password" required>
<button type="button" class="password-toggle" id="togglePassword" aria-label="Tampilkan password"><i class="bi bi-eye"></i></button>
</div>
</div>
<div class="auth-hint mb-4">Akses terbatas untuk admin sistem.</div>
<button type="submit" class="btn btn-pink w-100 auth-submit">Login</button>
</form>
</div>
</main>
<script src="assets/js/admin-auth.js"></script>
</body>
</html>
